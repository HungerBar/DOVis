<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOVis — Enter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #07090d; color: #f7fbff; }

.landing {
  position: relative;
  width: 100vw; height: 100vh;
  display: grid; place-items: center;
  overflow: hidden;
}

/* Deep ocean base — dark blue/black, not green */
.landing::before {
  content: '';
  position: absolute; inset: 0;
  background:
    /* Concentrated overhead light cone — like示意图中的聚光 */
    radial-gradient(ellipse 35% 45% at 38% 15%, rgba(140, 180, 200, 0.08), transparent 70%),
    radial-gradient(ellipse 20% 30% at 38% 5%, rgba(180, 210, 230, 0.06), transparent 60%),
    /* Deep blue ambient zones */
    radial-gradient(ellipse 50% 40% at 30% 50%, rgba(8, 22, 45, 0.6), transparent 70%),
    radial-gradient(ellipse 40% 50% at 70% 70%, rgba(5, 15, 35, 0.5), transparent 65%),
    /* Depth gradient — almost black to midnight blue */
    linear-gradient(180deg, #020408 0%, #040a14 20%, #06101e 40%, #081428 60%, #050c18 80%, #020406 100%);
  z-index: 0;
}

/* Vignette — heavy, dark edges */
.landing::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 55% 50% at 38% 40%, transparent 5%, rgba(2, 3, 6, 0.94) 100%);
  z-index: 1;
}

/* Overhead light cone — single concentrated beam like the reference */
.light-cone {
  position: absolute; z-index: 0;
  top: -5%; left: 25%; width: 30%; height: 65%;
  background: radial-gradient(ellipse 100% 100% at 50% 0%, rgba(160, 195, 220, 0.07) 0%, rgba(100, 150, 180, 0.03) 40%, transparent 70%);
  filter: blur(20px);
  animation: cone-pulse 6s ease-in-out infinite alternate;
}
@keyframes cone-pulse {
  from { opacity: 0.8; }
  to   { opacity: 1; }
}

/* Bathymetric contour lines — ocean floor topography (SVG inline) */
.contours {
  position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
  z-index: 0; overflow: hidden;
}
.contours svg {
  position: absolute; bottom: 0; left: -5%; width: 110%; height: 100%;
  opacity: 0.12;
}

/* Subtle seafloor glow where light hits the terrain */
.seafloor-glow {
  position: absolute; bottom: 10%; left: 20%; width: 30%; height: 20%;
  z-index: 0;
  background: radial-gradient(ellipse at 50% 80%, rgba(80, 130, 170, 0.06), transparent 70%);
  filter: blur(25px);
}

/* Floating particles — marine snow, blue-white tones */
.particles {
  position: absolute; inset: 0; z-index: 2;
}
.particles span {
  position: absolute;
  background: rgba(180, 210, 240, 0.6);
  border-radius: 50%;
  animation: float-up 12s linear infinite;
  opacity: 0;
  box-shadow: 0 0 6px rgba(140, 180, 220, 0.3);
}
/* Large bright particles */
.particles span:nth-child(1)  { left: 12%; width: 4px; height: 4px; animation-delay: 0s; animation-duration: 11s; }
.particles span:nth-child(2)  { left: 35%; width: 3px; height: 3px; animation-delay: 1.5s; animation-duration: 13s; }
.particles span:nth-child(3)  { left: 55%; width: 5px; height: 5px; animation-delay: 3s; animation-duration: 10s; box-shadow: 0 0 12px rgba(160, 200, 240, 0.5); }
.particles span:nth-child(4)  { left: 78%; width: 3px; height: 3px; animation-delay: 0.5s; animation-duration: 14s; }
.particles span:nth-child(5)  { left: 88%; width: 4px; height: 4px; animation-delay: 4s; animation-duration: 12s; }
.particles span:nth-child(6)  { left: 22%; width: 3px; height: 3px; animation-delay: 2s; animation-duration: 9s; }
.particles span:nth-child(7)  { left: 67%; width: 4px; height: 4px; animation-delay: 5s; animation-duration: 11s; }
.particles span:nth-child(8)  { left: 45%; width: 3px; height: 3px; animation-delay: 3.5s; animation-duration: 15s; }
/* Medium particles */
.particles span:nth-child(9)  { left: 8%;  width: 2px; height: 2px; animation-delay: 1s; animation-duration: 16s; background: rgba(150, 190, 230, 0.45); }
.particles span:nth-child(10) { left: 40%; width: 2px; height: 2px; animation-delay: 6s; animation-duration: 13s; background: rgba(150, 190, 230, 0.45); }
.particles span:nth-child(11) { left: 60%; width: 2px; height: 2px; animation-delay: 2.5s; animation-duration: 17s; background: rgba(150, 190, 230, 0.4); }
.particles span:nth-child(12) { left: 82%; width: 2px; height: 2px; animation-delay: 4.5s; animation-duration: 12s; background: rgba(150, 190, 230, 0.45); }
/* Tiny distant particles */
.particles span:nth-child(13) { left: 18%; width: 1.5px; height: 1.5px; animation-delay: 0.8s; animation-duration: 20s; background: rgba(180, 210, 240, 0.2); }
.particles span:nth-child(14) { left: 48%; width: 1.5px; height: 1.5px; animation-delay: 7s; animation-duration: 22s; background: rgba(180, 210, 240, 0.18); }
.particles span:nth-child(15) { left: 72%; width: 1.5px; height: 1.5px; animation-delay: 3.2s; animation-duration: 19s; background: rgba(180, 210, 240, 0.2); }
.particles span:nth-child(16) { left: 92%; width: 1.5px; height: 1.5px; animation-delay: 5.5s; animation-duration: 21s; background: rgba(180, 210, 240, 0.18); }
/* Warm-toned bioluminescent drifters */
.particles span:nth-child(17) { left: 28%; width: 3px; height: 3px; animation-delay: 1.2s; animation-duration: 18s; background: rgba(200, 180, 140, 0.25); box-shadow: 0 0 8px rgba(200, 180, 140, 0.15); }
.particles span:nth-child(18) { left: 70%; width: 2px; height: 2px; animation-delay: 8s; animation-duration: 16s; background: rgba(200, 180, 140, 0.2); box-shadow: 0 0 6px rgba(200, 180, 140, 0.1); }

@keyframes float-up {
  0%   { transform: translateY(100vh) scale(0.6); opacity: 0; }
  5%   { opacity: 0.8; }
  50%  { opacity: 0.6; transform: translateY(50vh) scale(1); }
  90%  { opacity: 0.3; }
  100% { transform: translateY(-5vh) scale(1.1); opacity: 0; }
}

/* Corner viewfinder frames */
.corner { position: absolute; z-index: 2; opacity: 0.15; }
.corner svg { width: 48px; height: 48px; }
.corner--tl { top: 28px; left: 28px; }
.corner--tr { top: 28px; right: 28px; transform: scaleX(-1); }
.corner--bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
.corner--br { bottom: 28px; right: 28px; transform: scale(-1, -1); }

/* Main content */
.content {
  position: relative; z-index: 3;
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  padding: 0 24px;
}

.brand {
  font-family: 'Spectral', serif;
  font-weight: 700;
  font-size: clamp(64px, 10vw, 96px);
  letter-spacing: 0.06em;
  color: #f7fbff;
  text-shadow: 0 0 60px rgba(120, 170, 220, 0.12), 0 0 120px rgba(80, 140, 200, 0.05);
  opacity: 0; animation: fade-rise 1.2s ease-out 0.3s forwards;
}

.headline {
  font-family: 'Spectral', serif;
  font-weight: 400; font-style: italic;
  font-size: clamp(22px, 3vw, 32px);
  color: rgba(247, 251, 255, 0.72);
  margin-top: 16px;
  letter-spacing: 0.02em;
  opacity: 0; animation: fade-rise 1.2s ease-out 0.7s forwards;
}

.divider {
  width: 64px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(140, 180, 220, 0.4), transparent);
  margin: 28px 0;
  opacity: 0; animation: fade-rise 1s ease-out 1s forwards;
}

.tagline {
  font-family: 'Inter', sans-serif;
  font-weight: 300; font-size: 12px;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(247, 251, 255, 0.4);
  opacity: 0; animation: fade-rise 1s ease-out 1.2s forwards;
}

.cta {
  margin-top: 48px;
  font-family: 'Spectral', serif; font-weight: 600; font-size: 15px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(160, 200, 240, 0.85);
  background: transparent;
  border: 1px solid rgba(140, 180, 220, 0.3);
  padding: 14px 42px;
  cursor: pointer;
  transition: all 0.4s ease;
  animation: fade-rise 1s ease-out 1.5s forwards, breathe 4s ease-in-out 2.5s infinite;
  opacity: 0;
}
.cta:hover {
  border-color: rgba(160, 200, 240, 0.7);
  color: rgba(200, 225, 255, 1);
  box-shadow: 0 0 30px rgba(120, 170, 220, 0.12), inset 0 0 30px rgba(120, 170, 220, 0.04);
}

/* Animations */
@keyframes fade-rise {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 0 15px rgba(120, 170, 220, 0.06); border-color: rgba(140, 180, 220, 0.3); }
  50%      { box-shadow: 0 0 25px rgba(120, 170, 220, 0.12); border-color: rgba(160, 200, 240, 0.5); }
}
</style>
</head>
<body>
<div class="landing">
  <div class="light-cone"></div>
  <div class="seafloor-glow"></div>

  <!-- Bathymetric contour lines — ocean floor topography -->
  <div class="contours">
    <svg viewBox="0 0 1440 600" preserveAspectRatio="none" fill="none" stroke="rgba(160,195,230,0.35)" stroke-width="1.2">
      <path d="M-50 520 C200 480, 400 510, 600 470 S900 440, 1100 480 S1350 500, 1500 460" />
      <path d="M-50 480 C180 440, 380 460, 580 420 S880 390, 1080 430 S1330 450, 1500 410" opacity="0.7" />
      <path d="M-50 440 C160 400, 360 420, 560 380 S850 350, 1060 380 S1310 400, 1500 370" opacity="0.5" />
      <path d="M-50 400 C150 365, 340 380, 540 345 S830 320, 1040 345 S1280 360, 1500 330" opacity="0.35" />
      <path d="M-50 365 C140 330, 320 345, 520 315 S810 290, 1020 315 S1260 330, 1500 300" opacity="0.22" />
      <path d="M-50 335 C130 300, 300 315, 500 285 S790 265, 1000 285 S1240 300, 1500 275" opacity="0.14" />
      <path d="M-50 305 C120 275, 280 285, 480 260 S770 240, 980 260 S1220 275, 1500 250" opacity="0.08" />
    </svg>
  </div>

  <div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="corner corner--tl"><svg viewBox="0 0 48 48" fill="none" stroke="rgba(140,180,220,0.4)" stroke-width="1"><path d="M0 16 L0 0 L16 0"/></svg></div>
  <div class="corner corner--tr"><svg viewBox="0 0 48 48" fill="none" stroke="rgba(140,180,220,0.4)" stroke-width="1"><path d="M0 16 L0 0 L16 0"/></svg></div>
  <div class="corner corner--bl"><svg viewBox="0 0 48 48" fill="none" stroke="rgba(140,180,220,0.4)" stroke-width="1"><path d="M0 16 L0 0 L16 0"/></svg></div>
  <div class="corner corner--br"><svg viewBox="0 0 48 48" fill="none" stroke="rgba(140,180,220,0.4)" stroke-width="1"><path d="M0 16 L0 0 L16 0"/></svg></div>

  <div class="content">
    <h1 class="brand">DOVis</h1>
    <p class="headline">Six thousand meters of silence.</p>
    <div class="divider"></div>
    <p class="tagline">Global Dissolved Oxygen Visualization</p>
    <button class="cta">Enter</button>
  </div>
</div>
</body>
</html>
