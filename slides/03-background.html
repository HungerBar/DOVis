<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><title>DOVis · 背景</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1920px;height:1080px;overflow:hidden}
body{background:#000;color:#fff;font-family:"Times New Roman","Noto Serif SC",serif;-webkit-font-smoothing:antialiased;position:relative}
.bg{position:absolute;inset:0;overflow:hidden}
.bg img{width:100%;height:100%;object-fit:cover;opacity:.18}
.bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.7) 0%,rgba(0,0,0,.3) 50%,rgba(0,0,0,.8) 100%)}
.content{position:relative;z-index:1;padding:80px 120px;height:100%;display:flex;flex-direction:column}
.kicker{font-family:"Consolas",monospace;font-size:15px;letter-spacing:.4em;color:#555;text-transform:uppercase;margin-bottom:32px}
.hero{font-weight:900;font-size:65px;letter-spacing:-0.03em;line-height:1.25;margin-bottom:64px}
.hero .hl{color:#7BA1B7}
.timeline-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;padding:0 40px}
.node{text-align:center;display:flex;flex-direction:column;align-items:center}
.dot{width:18px;height:18px;border-radius:50%;background:#7BA1B7;box-shadow:0 0 20px rgba(123,161,183,.5);margin-bottom:20px}
.n-year{font-family:"Consolas",monospace;font-size:14px;color:#555;letter-spacing:.15em;margin-bottom:8px;text-transform:uppercase}
.n-num{font-weight:900;font-size:52px;color:#7BA1B7;letter-spacing:-0.02em;margin-bottom:8px;line-height:1}
.n-title{font-weight:700;font-size:27px;margin-bottom:10px;color:#eee}
.n-desc{font-size:19px;color:#777;line-height:1.6;max-width:320px}
.source{position:absolute;bottom:48px;left:120px;font-family:"Consolas",monospace;font-size:14px;color:#333;letter-spacing:.1em;z-index:1}
</style></head><body>
<div class="bg"><img src="../assets/img/blue-marble.jpg" alt="Earth"></div>
<div class="content">
<div class="kicker">Background · 研究背景</div>
<h1 class="hero">从全球脱氧到<span class="hl">三维可视化</span></h1>
<div class="timeline-wrap">
<svg class="tl-svg" width="100%" height="12" style="position:absolute;top:50%;left:40px;right:40px;width:calc(100% - 80px);transform:translateY(-50%)">
<line class="tl-line" x1="0" y1="6" x2="100%" y2="6" stroke="#7BA1B7" stroke-width="2" stroke-opacity="0.5"/>
</svg>
<div class="nodes"></div>
</div>
</div>
<div class="source">Data: Huang et al., Frontiers in Marine Science, 2023 · DOI: 10.3389/fmars.2023.1291232</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>(function(){if(window.frameElement)return;var b=document.body,w=1920,h=1080;function fit(){var s=innerWidth/w;b.style.transform="scale("+s+")";b.style.transformOrigin="top left";document.documentElement.style.background="#000"}fit();window.addEventListener("resize",fit)})()</script>
<script>
(function(){
  var data=[
    {year:'1970–2020',title:'全球海洋脱氧',desc:'过去 50 年全球海洋氧含量下降约 2%，深海脱氧持续加剧',num:'−2%'},
    {year:'印度洋',title:'OMZ 重灾区',desc:'全球最大氧最小区，氧损失速率 −141.5±15.1 Tmol/decade',num:'−141.5'},
    {year:'Huang et al. 2023',title:'ML 重建四维 DO',desc:'ERT/RF 机器学习重建 1980–2019 印度洋溶解氧场',num:'R²=0.969'},
    {year:'DOVis',title:'三维交互平台',desc:'5–5395m 全深度 50 层 × 480 月时间步，实时探索',num:'50层×480月'}
  ];
  var wrap=document.querySelector('.nodes');
  wrap.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:32px;position:relative;z-index:2';
  data.forEach(function(d){
    var node=document.createElement('div');
    node.className='node';
    node.innerHTML='<div class="dot"></div><div class="n-year">'+d.year+'</div><div class="n-num">'+d.num+'</div><div class="n-title">'+d.title+'</div><div class="n-desc">'+d.desc+'</div>';
    wrap.appendChild(node);
  });

  var line=document.querySelector('.tl-line');
  var lineLen=1680;
  gsap.set(line,{strokeDasharray:lineLen,strokeDashoffset:lineLen});
  gsap.set(['.kicker','.hero','.node','.source'],{autoAlpha:0});

  var tl=gsap.timeline({defaults:{ease:'power3.out'}});
  tl.fromTo('.bg img',{scale:1.15},{scale:1.0,duration:4,ease:'power1.out'},0)
    .fromTo('.kicker',{autoAlpha:0,x:-20,filter:'blur(4px)'},{autoAlpha:1,x:0,filter:'blur(0px)',duration:0.5},0.2)
    .fromTo('.hero',{autoAlpha:0,y:20,filter:'blur(4px)'},{autoAlpha:1,y:0,filter:'blur(0px)',duration:0.7},0.4)
    .to(line,{strokeDashoffset:0,duration:1.8,ease:'power2.inOut'},0.9)
    .fromTo('.node',{autoAlpha:0,y:30,scale:0.9},{autoAlpha:1,y:0,scale:1,duration:0.7,stagger:0.25},1.2)
    .fromTo('.dot',{scale:0,boxShadow:'0 0 0px rgba(123,161,183,0)'},{scale:1,boxShadow:'0 0 20px rgba(123,161,183,.5)',duration:0.5,stagger:0.25,ease:'back.out(2)'},1.2)
    .fromTo('.source',{autoAlpha:0},{autoAlpha:1,duration:0.5},2.8);
})();
</script>
</body></html>
